buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

// Local-dev only: resolve com.erxes:messenger-sdk from ~/.m2 (the erxes Android
// SDK installed via `./gradlew :messenger-sdk:publishToMavenLocal`). Remove this
// once the SDK is published to a remote repo (e.g. JitPack/Maven Central).
allprojects {
    repositories {
        mavenLocal()
    }
}

apply plugin: "com.facebook.react.rootproject"
